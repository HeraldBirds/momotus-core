<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Momotus Core | Camisetas Nicaragua</title>
  <meta name="description" content="Tienda oficial Momotus Core. Camisetas premium con diseños únicos de Nicaragua: Nicas, Anime, Arte Urbano y más. Envío rápido en todo el país.">
  
  <!-- === SEGURIDAD NETLIFY - Momotus Core (Abril 2026) === -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self';">

  <link rel="preload" href="img/heroes/hero-tienda.webp" as="image" type="image/webp">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: [],
      theme: { extend: { colors: { momotus: '#facc15' } } }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" 
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/style.css">

  <style>
    .filter-icon {
      width: 28px;
      height: 28px;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn:hover .filter-icon,
    .filter-btn.active .filter-icon {
      transform: rotate(360deg);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div id="navbar-placeholder"></div>

  <!-- HERO TIENDA -->
  <div class="relative h-[620px] bg-cover bg-center flex items-center overflow-hidden" style="background-image: url('img/heroes/hero-tienda.webp');">
    <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/70"></div>
    <div class="max-w-7xl mx-auto px-6 relative z-10 text-center w-full">
      <h1 class="text-7xl md:text-8xl font-black tracking-[-3px] leading-none text-white mb-4 drop-shadow-2xl">TIENDA MOMOTUS</h1>
      <p class="text-3xl text-yellow-300 font-light max-w-xl mx-auto">Diseños únicos que gritan Nicaragua</p>
    </div>
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-black/70 backdrop-blur-md px-8 py-3 rounded-3xl text-sm font-medium flex items-center gap-2 shadow-2xl animate-pulse">
      <i class="fa-solid fa-fire text-orange-400"></i> NUEVA COLECCIÓN 2026
    </div>
  </div>

  <section class="py-12 bg-zinc-900">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
        <div>
          <h2 class="text-4xl font-bold">Catálogo completo</h2>
          <p id="results-count" class="text-zinc-400">Mostrando <span id="count-number" class="text-yellow-400 font-semibold">30</span> diseños</p>
        </div>

        <div class="flex flex-wrap gap-4">
          <div class="relative w-full md:w-80">
            <input id="search-input" type="text" placeholder="Buscar camisetas..." 
                   class="w-full bg-zinc-800 border border-zinc-700 focus:border-yellow-400 rounded-3xl py-4 px-6 pl-12 outline-none transition">
            <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-zinc-400"></i>
          </div>

          <select id="sort-select" onchange="sortProducts()" class="bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 outline-none text-white">
            <option value="default">Ordenar por...</option>
            <option value="price-low">Precio: Menor a Mayor</option>
            <option value="price-high">Precio: Mayor a Menor</option>
            <option value="name">Nombre A-Z</option>
          </select>

          <button onclick="resetFilters()" class="px-6 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-medium flex items-center gap-2 transition">
            <i class="fa-solid fa-rotate-right"></i> Limpiar todo
          </button>
        </div>
      </div>

      <!-- FILTROS CON ICONOS PERSONALIZADOS -->
      <div class="flex flex-wrap gap-3 mb-12 overflow-x-auto pb-2 snap-x snap-mandatory scrollbar-hide">
        <button onclick="filterCategory('all')" id="filter-all" class="filter-btn active px-8 py-3 rounded-3xl text-sm font-medium transition flex items-center gap-3">
          <img src="img/icons/icon-todos.webp" alt="Todos" class="filter-icon">
          Todos
        </button>
        <button onclick="filterCategory('nica')" id="filter-nica" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition flex items-center gap-3">
          <img src="img/icons/icon-nica.webp" alt="Nicas" class="filter-icon">
          Nicas
        </button>
        <button onclick="filterCategory('anime')" id="filter-anime" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition flex items-center gap-3">
          <img src="img/icons/icon-anime.webp" alt="Anime" class="filter-icon">
          Anime
        </button>
        <button onclick="filterCategory('urbano')" id="filter-urbano" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition flex items-center gap-3">
          <img src="img/icons/icon-urbano.webp" alt="Urbano" class="filter-icon">
          Urbano
        </button>
        <button onclick="filterCategory('games')" id="filter-games" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition flex items-center gap-3">
          <img src="img/icons/icon-games.webp" alt="Games" class="filter-icon">
          Games
        </button>
        <button onclick="filterCategory('unica')" id="filter-unica" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition flex items-center gap-3">
          <img src="img/icons/icon-unica.webp" alt="Únicas" class="filter-icon">
          Únicas
        </button>
      </div>

      <!-- MÁS VENDIDOS -->
      <div class="mb-12">
        <h3 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-fire text-orange-400"></i> Más Vendidos 2026</h3>
        <div id="best-sellers-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6"></div>
      </div>

      <!-- GRID PRINCIPAL -->
      <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>
  </section>

  <div id="cart-modal-placeholder"></div>

  <script src="js/script.js"></script>

  <script>
    let currentCategory = 'all';
    let currentSearchTerm = '';
    let currentMinPrice = 0;
    let currentMaxPrice = 999;

    function filterPrice(min, max) {
      currentMinPrice = min;
      currentMaxPrice = max;
      document.querySelectorAll('.price-btn').forEach(btn => btn.classList.remove('bg-yellow-400', 'text-black'));
      filterProducts();
    }

    function toggleWishlist(id) {
      if (isInWishlist(id)) removeFromWishlist(id);
      else addToWishlist(id);
      renderBestSellers();
      filterProducts();
    }

    function renderBestSellers() {
      const container = document.getElementById('best-sellers-grid');
      if (!container) return;
      container.innerHTML = '';

      const bestSellerIds = [2, 1, 13, 14];
      const bestProducts = products.filter(p => bestSellerIds.includes(p.id));

      bestProducts.forEach(product => {
        const inWishlist = isInWishlist(product.id);
        const card = document.createElement('div');
        card.className = 'product-card bg-zinc-900 rounded-3xl overflow-hidden group relative';
        card.innerHTML = `
          <div class="relative">
            <img src="${product.img}" onclick="showQuickView(${product.id})" class="w-full aspect-square object-cover transition group-hover:scale-105 cursor-pointer">
            <span class="absolute top-4 left-4 bg-orange-500 text-white text-xs font-bold px-3 py-1 rounded-full">🔥</span>
            <button onclick="event.stopImmediatePropagation(); toggleWishlist(${product.id});" class="absolute top-4 right-4 text-2xl ${inWishlist ? 'text-red-500' : 'text-white/70 hover:text-red-500'} transition">
              <i class="fa-solid fa-heart"></i>
            </button>
          </div>
          <div class="p-5">
            <h3 onclick="showQuickView(${product.id})" class="font-bold text-lg mb-1 cursor-pointer line-clamp-2">${product.name}</h3>
            <p class="text-yellow-400 font-semibold text-2xl">C$ ${product.price}</p>
            <button onclick="event.stopImmediatePropagation(); addToCartWithSize(${product.id}, '${product.sizes[0]}');" 
                    class="mt-4 w-full bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-3 rounded-3xl text-sm transition">
              Añadir al carrito
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function resetFilters() {
      currentCategory = 'all';
      currentSearchTerm = '';
      currentMinPrice = 0;
      currentMaxPrice = 999;
      document.getElementById('search-input').value = '';
      document.getElementById('sort-select').value = 'default';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.id === 'filter-all'));
      filterProducts();
    }

    window.addEventListener('load', () => {
      renderBestSellers();
      renderProducts(products);

      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', () => {
          currentSearchTerm = searchInput.value.toLowerCase().trim();
          filterProducts();
        });
      }

      console.log("%c✅ TIENDA ACTUALIZADA - Catálogo grande + Games listo", "color:#facc15; font-weight:bold");
    });
  </script>
</body>
</html>
