<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - Momotus Core | Camisetas Nicaragua</title>
  <meta name="description" content="Tienda oficial Momotus Core. Camisetas premium con diseños únicos de Nicaragua: Nicas, Anime, Arte Urbano y más. Envío rápido en todo el país.">
  
  <link rel="preload" href="img/heroes/hero-tienda.webp" as="image" type="image/webp">

  <!-- Tailwind CDN optimizado -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {
          colors: {
            momotus: '#facc15'
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white">

  <div id="navbar-placeholder"></div>

  <!-- HERO TIENDA -->
  <div class="relative h-[620px] bg-cover bg-center flex items-center overflow-hidden" style="background-image: url('img/heroes/hero-tienda.webp');">
    <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/70"></div>
    <div class="max-w-7xl mx-auto px-6 relative z-10 text-center w-full">
      <h1 class="text-7xl md:text-8xl font-black tracking-[-3px] leading-none text-white mb-4 drop-shadow-2xl">TIENDA MOMOTUS</h1>
      <p class="text-3xl text-yellow-300 font-light max-w-xl mx-auto">Diseños únicos que gritan Nicaragua</p>
    </div>
    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-black/70 backdrop-blur-md px-8 py-3 rounded-3xl text-sm font-medium flex items-center gap-2 shadow-2xl animate-pulse">
      <i class="fa-solid fa-fire text-orange-400"></i> NUEVA COLECCIÓN 2026
    </div>
  </div>

  <section class="py-12 bg-zinc-900">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
        <div>
          <h2 class="text-4xl font-bold">Catálogo completo</h2>
          <p id="results-count" class="text-zinc-400">Mostrando <span id="count-number" class="text-yellow-400 font-semibold">14</span> diseños</p>
        </div>
        <div class="flex flex-wrap gap-4">
          <div class="relative w-full md:w-80">
            <input id="search-input" type="text" placeholder="Buscar camisetas..." class="w-full bg-zinc-800 border border-zinc-700 focus:border-yellow-400 rounded-3xl py-4 px-6 pl-12 outline-none transition">
            <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-zinc-400"></i>
          </div>
          <select id="sort-select" onchange="sortProducts()" class="bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 outline-none text-white">
            <option value="default">Ordenar por...</option>
            <option value="price-low">Precio: Menor a Mayor</option>
            <option value="price-high">Precio: Mayor a Menor</option>
            <option value="name">Nombre A-Z</option>
          </select>
        </div>
      </div>

      <!-- Filtros -->
      <div class="flex flex-wrap gap-3 mb-12 overflow-x-auto pb-2 snap-x snap-mandatory scrollbar-hide">
        <button onclick="filterCategory('all')" id="filter-all" class="filter-btn active px-8 py-3 rounded-3xl text-sm font-medium transition">Todos</button>
        <button onclick="filterCategory('nica')" id="filter-nica" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition">Nicas</button>
        <button onclick="filterCategory('anime')" id="filter-anime" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition">Anime</button>
        <button onclick="filterCategory('urbano')" id="filter-urbano" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition">Arte Urbano</button>
        <button onclick="filterCategory('abstracta')" id="filter-abstracta" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition">Abstractas</button>
        <button onclick="filterCategory('unica')" id="filter-unica" class="filter-btn px-8 py-3 rounded-3xl text-sm font-medium transition">Únicas</button>
      </div>

      <!-- MÁS VENDIDOS -->
      <div class="mb-12">
        <h3 class="text-2xl font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-fire text-orange-400"></i> Más Vendidos</h3>
        <div id="best-sellers-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6"></div>
      </div>

      <!-- Grid principal -->
      <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>
  </section>

  <div id="cart-modal-placeholder"></div>

  <!-- SCRIPT ORIGINAL -->
  <script src="js/script.js"></script>
</body>
</html>
